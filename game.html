<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAMMAR ARENA: INFINITY 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #9333ea; --s: #bef264; --w: #fbbf24; --d: #ff6b6b; --blue: #7dd3fc; --dark: #1a1a1a; }
        * { box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background-color: #fdfaf6; margin: 0; padding: 10px; color: var(--dark); }
        
        .neu-card {
            border: 4px solid var(--dark); border-radius: 15px; padding: 20px;
            box-shadow: 6px 6px 0px 0px var(--dark); background: white; margin-bottom: 20px;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-neu {
            width: 100%; border: 4px solid var(--dark); box-shadow: 4px 4px 0px 0px var(--dark);
            background-color: #fff; font-weight: 900; border-radius: 12px;
            padding: 12px; cursor: pointer; transition: 0.1s; text-transform: uppercase;
        }
        .btn-neu:hover { transform: translate(-2px, -2px); background: #fafafa; }
        .btn-neu:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--dark); }
        
        .tag { padding: 4px 10px; border: 2.5px solid var(--dark); border-radius: 6px; font-size: 0.75rem; font-weight: 900; }
        
        #quiz-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdfaf6; z-index: 1000; padding: 20px; overflow-y: auto; }
        
        .word-chip {
            display: inline-block; padding: 12px 18px; border: 3px solid var(--dark);
            background: #fff; margin: 6px; cursor: pointer; font-weight: 800; border-radius: 10px;
            box-shadow: 3px 3px 0px var(--dark);
        }
        input.neu-input {
            width: 100%; border: 4px solid var(--dark); padding: 15px; font-size: 1.4rem;
            border-radius: 12px; outline: none; margin-bottom: 15px; text-align: center; box-shadow: 4px 4px 0px var(--dark);
        }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .shake { animation: shake 0.3s; background: #fee2e2 !important; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="neu-card flex-between" style="position: sticky; top: 0; z-index: 99; background: white;">
        <div style="font-weight:900; font-size:1.3rem;">🦉 GRAMMAR <span style="color:var(--p)">INFINITY</span></div>
        <div class="tag" style="background:var(--s); font-size:1rem;">XP: <span id="global-xp">0</span></div>
    </div>

    <!-- Map View -->
    <div id="map-view">
        <div class="neu-card" style="background: var(--blue);">
            <h2 style="margin:0;">INFINITY GENERATOR v2.0</h2>
            <p style="font-weight:700;">Hệ thống đã sẵn sàng tạo ra >10.000 câu hỏi ngẫu nhiên.</p>
        </div>

        <div class="grid-2" id="stage-list"></div>

        <div class="neu-card" style="background: #fff;">
            <h3>🎴 SMART FLASHCARDS (ANTI-LOOP)</h3>
            <div id="fc-content" style="text-align:center; padding: 20px; border: 3px dashed var(--dark); margin-bottom: 15px; border-radius: 10px;">
                <h1 id="fc-word" style="margin:0; color:var(--p); font-size: 2.5rem;">...</h1>
                <p id="fc-mean" style="font-size:1.2rem; font-weight:700;">...</p>
            </div>
            <button class="btn-neu" onclick="nextSmartFlashcard()">HỌC TỪ TIẾP THEO 🔄</button>
        </div>
    </div>

    <!-- Quiz View -->
    <div id="quiz-view">
        <div class="neu-card" style="max-width: 600px; margin: auto;">
            <div class="flex-between" style="margin-bottom: 20px;">
                <span id="quiz-title" class="tag" style="background:var(--w);">PRESENT SIMPLE</span>
                <span id="combo-display" style="font-weight:900; color:var(--d);"></span>
            </div>
            <div id="question-box" style="text-align:center; min-height: 300px;">
                <h2 id="q-text" style="font-size: 1.7rem; line-height: 1.4; margin-bottom: 30px;">...</h2>
                <div id="ans-zone"></div>
            </div>
            <button class="btn-neu" style="background:#ddd; margin-top:30px;" onclick="exitQuiz()">🏳️ DỪNG CUỘC CHƠI</button>
        </div>
    </div>

    <script>
        // --- NGÂN HÀNG DỮ LIỆU KHỔNG LỒ (THE DATA MATRIX) ---
        const DATA_MATRIX = {
            subjects: [
                {n: "The software engineer", sing: true}, {n: "My best friends", sing: false}, 
                {n: "The CEO", sing: true}, {n: "A mysterious robot", sing: true}, 
                {n: "Our professors", sing: false}, {n: "The chef", sing: true},
                {n: "Many tourists", sing: false}, {n: "The pilot", sing: true},
                {n: "The cat", sing: true}, {n: "Cybersecurity experts", sing: false}
            ],
            verbs: [
                {base: "analyze", s: "analyzes", ed: "analyzed", ing: "analyzing", m: "phân tích"},
                {base: "develop", s: "develops", ed: "developed", ing: "developing", m: "phát triển"},
                {base: "organize", s: "organizes", ed: "organized", ing: "organizing", m: "tổ chức"},
                {base: "protect", s: "protects", ed: "protected", ing: "protecting", m: "bảo vệ"},
                {base: "explore", s: "explores", ed: "explored", ing: "exploring", m: "khám phá"},
                {base: "construct", s: "constructs", ed: "constructed", ing: "constructing", m: "xây dựng"},
                {base: "improve", s: "improves", ed: "improved", ing: "improving", m: "cải thiện"},
                {base: "investigate", s: "investigates", ed: "investigated", ing: "investigating", m: "điều tra"},
                {base: "create", s: "creates", ed: "created", ing: "creating", m: "tạo ra"},
                {base: "observe", s: "observes", ed: "observed", ing: "observing", m: "quan sát"}
            ],
            objects: [
                "a new digital system", "the complex data", "an ancient temple", 
                "the global market", "a luxury restaurant", "the security firewall",
                "the deep ocean", "a secret experiment", "the project results"
            ],
            time: {
                pres_sim: ["every morning", "frequently", "on Mondays", "once a week"],
                pres_cont: ["at this moment", "right now", "currently"],
                past_sim: ["yesterday", "two days ago", "last night", "in 2024"],
                fut_sim: ["tomorrow", "next year", "soon", "in the future"]
            }
        };

        const STAGES = [
            { id: 'pres_sim', name: 'Present Simple', color: '#bef264', type: 1 },
            { id: 'pres_cont', name: 'Present Continuous', color: '#7dd3fc', type: 1 },
            { id: 'past_sim', name: 'Past Simple', color: '#fbbf24', type: 2 },
            { id: 'fut_sim', name: 'Future Simple', color: '#ff90e8', type: 3 }
        ];

        // --- STATE ---
        let xp = 0;
        let combo = 0;
        let curTense = "";
        let vocabQueue = [...DATA_MATRIX.verbs].sort(() => Math.random() - 0.5);

        // --- GENERATOR ENGINE (NHÀ MÁY SẢN XUẤT BÀI TẬP) ---
        function generateInfinityQuestion(tenseId) {
            const sub = DATA_MATRIX.subjects[Math.floor(Math.random() * DATA_MATRIX.subjects.length)];
            const v = DATA_MATRIX.verbs[Math.floor(Math.random() * DATA_MATRIX.verbs.length)];
            const obj = DATA_MATRIX.objects[Math.floor(Math.random() * DATA_MATRIX.objects.length)];
            const time = DATA_MATRIX.time[tenseId][Math.floor(Math.random() * DATA_MATRIX.time[tenseId].length)];
            
            let q = "", a = "", dist = [], words = [];

            if (tenseId === 'pres_sim') {
                q = `${sub.n} (${v.base}) ___ ${obj} ${time}.`;
                a = sub.sing ? v.s : v.base;
                dist = [v.ing, v.ed, sub.sing ? v.base : v.s];
            } else if (tenseId === 'pres_cont') {
                let be = sub.sing ? "is" : "are";
                q = `${sub.n} (be/work) ___ ${obj} ${time}.`;
                a = `${be} ${v.ing}`;
                dist = [`${be} ${v.ed}`, `am ${v.ing}`, v.s];
            } else if (tenseId === 'past_sim') {
                q = `${sub.n} / ${v.ed} / ${obj} / ${time}`;
                a = `${sub.n} ${v.ed} ${obj} ${time}`;
                words = [sub.n, v.ed, obj, time].sort(() => Math.random() - 0.5);
            } else if (tenseId === 'fut_sim') {
                q = `I hope ${sub.n} (${v.base}) ___ ${obj} ${time}.`;
                a = `will ${v.base}`;
                dist = [`won't ${v.base}`, `will ${v.ing}`, v.ed];
            }

            return { q, a, dist, words, type: (tenseId === 'past_sim' ? 2 : (tenseId === 'fut_sim' ? 3 : 1)) };
        }

        // --- UI RENDER ---
        function renderMap() {
            const list = document.getElementById('stage-list');
            list.innerHTML = '';
            STAGES.forEach(s => {
                list.innerHTML += `
                    <div class="neu-card" style="background:${s.color}">
                        <h3 style="margin:0 0 10px 0">${s.name}</h3>
                        <div class="tag" style="background:white; margin-bottom:10px;">INFINITY MODE</div>
                        <button class="btn-neu" onclick="startQuiz('${s.id}')">VÀO TRẬN</button>
                    </div>
                `;
            });
            document.getElementById('global-xp').innerText = xp;
        }

        function startQuiz(id) {
            curTense = id;
            combo = 0;
            document.getElementById('map-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            nextQuestion();
        }

        function nextQuestion() {
            const q = generateInfinityQuestion(curTense);
            document.getElementById('quiz-title').innerText = curTense.replace('_',' ').toUpperCase();
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('combo-display').innerText = combo > 1 ? `🔥 COMBO X${combo}` : '';
            
            const zone = document.getElementById('ans-zone');
            zone.innerHTML = '';

            if (q.type === 1 || q.type === 3) { // Multiple choice
                const all = [...q.dist, q.a].sort(() => Math.random() - 0.5);
                all.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn-neu'; b.style.marginBottom = '10px';
                    b.innerText = opt;
                    b.onclick = () => checkAns(opt, q.a);
                    zone.appendChild(b);
                });
            } else if (q.type === 2) { // Scramble
                let userArr = [];
                const display = document.createElement('div');
                display.className = 'neu-card'; display.style.minHeight = '60px'; display.style.fontSize = '1.2rem';
                zone.appendChild(display);
                q.words.forEach(w => {
                    const c = document.createElement('span');
                    c.className = 'word-chip'; c.innerText = w;
                    c.onclick = () => {
                        userArr.push(w); display.innerText = userArr.join(" "); c.style.visibility = 'hidden';
                        if(userArr.length === q.words.length) setTimeout(() => checkAns(userArr.join(" "), q.a), 400);
                    };
                    zone.appendChild(c);
                });
            }
        }

        function checkAns(input, target) {
            if (input.toLowerCase() === target.toLowerCase()) {
                confetti({ particleCount: 50, spread: 60 });
                combo++;
                xp += (10 * combo);
                document.getElementById('global-xp').innerText = xp;
                setTimeout(nextQuestion, 600);
            } else {
                combo = 0;
                document.getElementById('question-box').classList.add('shake');
                setTimeout(() => document.getElementById('question-box').classList.remove('shake'), 400);
            }
        }

        function exitQuiz() {
            document.getElementById('map-view').style.display = 'block';
            document.getElementById('quiz-view').style.display = 'none';
            renderMap();
        }

        // Flashcards Logic
        function nextSmartFlashcard() {
            if (vocabQueue.length === 0) vocabQueue = [...DATA_MATRIX.verbs].sort(() => Math.random() - 0.5);
            const v = vocabQueue.shift();
            document.getElementById('fc-word').innerText = v.base.toUpperCase();
            document.getElementById('fc-mean').innerText = `${v.m} (V2: ${v.ed})`;
        }

        renderMap();
        nextSmartFlashcard();
    </script>
</body>
</html>
