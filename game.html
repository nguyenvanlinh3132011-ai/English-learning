<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAMMAR ARENA: EXAM MASTER 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #9333ea; --s: #bef264; --w: #fbbf24; --d: #ff6b6b; --blue: #7dd3fc; --dark: #1a1a1a; }
        * { box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background-color: #fdfaf6; margin: 0; padding: 10px; color: var(--dark); }
        
        .neu-card {
            border: 4px solid var(--dark); border-radius: 15px; padding: 20px;
            box-shadow: 6px 6px 0px 0px var(--dark); background: white; margin-bottom: 20px;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-neu {
            width: 100%; border: 4px solid var(--dark); box-shadow: 4px 4px 0px 0px var(--dark);
            background-color: #fff; font-weight: 900; border-radius: 12px;
            padding: 12px; cursor: pointer; transition: 0.1s; text-transform: uppercase;
        }
        .btn-neu:hover { transform: translate(-2px, -2px); background: #fafafa; }
        .btn-neu:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--dark); }
        
        .tag { padding: 4px 10px; border: 2.5px solid var(--dark); border-radius: 6px; font-size: 0.75rem; font-weight: 900; }
        .exam-label { background: var(--d); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.6rem; margin-bottom: 5px; display: inline-block; }
        
        #quiz-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdfaf6; z-index: 1000; padding: 20px; overflow-y: auto; }
        
        .word-chip {
            display: inline-block; padding: 12px 18px; border: 3px solid var(--dark);
            background: #fff; margin: 6px; cursor: pointer; font-weight: 800; border-radius: 10px;
            box-shadow: 3px 3px 0px var(--dark);
        }
        .shake { animation: shake 0.3s; background: #fee2e2 !important; border-color: var(--d) !important; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
    </style>
</head>
<body>

    <div class="neu-card flex-between" style="position: sticky; top: 0; z-index: 99; background: white;">
        <div style="font-weight:900; font-size:1.3rem;">🎯 EXAM <span style="color:var(--p)">MASTER</span></div>
        <div class="tag" style="background:var(--s); font-size:1rem;">XP: <span id="global-xp">0</span></div>
    </div>

    <div id="map-view">
        <div class="neu-card" style="background: var(--blue);">
            <h2 style="margin:0;">REAL EXAM DATABASE 📑</h2>
            <p style="font-weight:700;">Hệ thống tự động trộn đề IELTS/TOEIC chuẩn 2026.</p>
        </div>
        <div class="grid-2" id="stage-list"></div>

        <div class="neu-card">
            <h3>🎴 SMART FLASHCARDS</h3>
            <div id="fc-content" style="text-align:center; padding: 20px; border: 3px dashed var(--dark); margin-bottom: 15px; border-radius: 10px;">
                <h1 id="fc-word" style="margin:0; color:var(--p); font-size: 2.2rem;">...</h1>
                <p id="fc-mean" style="font-size:1.1rem; font-weight:700;">...</p>
            </div>
            <button class="btn-neu" onclick="nextSmartFlashcard()">HỌC TỪ MỚI 🔄</button>
        </div>
    </div>

    <div id="quiz-view">
        <div class="neu-card" style="max-width: 600px; margin: auto;">
            <div class="flex-between" style="margin-bottom: 20px;">
                <div id="exam-source" class="exam-label">IELTS ACADEMIC</div>
                <span id="quiz-title" class="tag" style="background:var(--w);">...</span>
            </div>
            <div id="question-box" style="text-align:center; min-height: 250px; padding: 20px; border-radius: 15px; border: 4px solid transparent; transition: 0.3s;">
                <h2 id="q-text" style="font-size: 1.5rem; line-height: 1.4; margin-bottom: 25px;">...</h2>
                <div id="ans-zone"></div>
            </div>
            <button class="btn-neu" style="background:#ddd; margin-top:30px;" onclick="exitQuiz()">🏳️ THOÁT</button>
        </div>
    </div>

    <script>
        const EXAM_DATA = {
            sources: ["TOEIC TEST", "IELTS ACADEMIC", "THPT QUỐC GIA", "CAMBRIDGE B2"],
            subjects: [
                "The board of directors", "The rate of unemployment", "Climate change", 
                "The local authorities", "Several innovative startups", "The marketing department",
                "Advanced technology", "Each of the participants", "The economic crisis"
            ],
            verbs: [
                {base: "implement", s: "implements", ed: "implemented", ing: "implementing", m: "triển khai (thực hiện)"},
                {base: "postpone", s: "postpones", ed: "postponed", ing: "postponing", m: "trì hoãn"},
                {base: "contribute", s: "contributes", ed: "contributed", ing: "contributing", m: "đóng góp"},
                {base: "enhance", s: "enhances", ed: "enhanced", ing: "enhancing", m: "nâng cao (cải thiện)"},
                {base: "collaborate", s: "collaborates", ed: "collaborated", ing: "collaborating", m: "hợp tác"}
            ],
            contexts: [
                "new policies to boost productivity", "the annual conference until next week", 
                "significantly to the global warming", "the living standards of residents",
                "effectively on the international project"
            ]
        };

        const STAGES = [
            { id: 'pres_sim', name: 'Present Simple', color: '#bef264' },
            { id: 'pres_perf', name: 'Pres. Perfect', color: '#7dd3fc' },
            { id: 'past_sim', name: 'Past Simple', color: '#fbbf24' },
            { id: 'past_cont', name: 'Past Continuous', color: '#ff90e8' }
        ];

        let xp = 0;
        let curTense = "";
        let isChecking = false;

        function isSingular(sub) {
            const singulars = ["board", "rate", "Climate", "Each", "crisis", "technology", "department"];
            return singulars.some(word => sub.includes(word));
        }

        function generateExamQuestion(tenseId) {
            const src = EXAM_DATA.sources[Math.floor(Math.random() * EXAM_DATA.sources.length)];
            const sub = EXAM_DATA.subjects[Math.floor(Math.random() * EXAM_DATA.subjects.length)];
            const v = EXAM_DATA.verbs[Math.floor(Math.random() * EXAM_DATA.verbs.length)];
            const ctx = EXAM_DATA.contexts[Math.floor(Math.random() * EXAM_DATA.contexts.length)];
            let q = "", a = "", dist = [], words = [], type = 1;

            if (tenseId === 'pres_sim') {
                q = `${sub} usually (${v.base}) ___ ${ctx}.`;
                a = isSingular(sub) ? v.s : v.base;
                dist = [v.ing, v.ed, isSingular(sub) ? v.base : v.s];
            } else if (tenseId === 'pres_perf') {
                let hv = isSingular(sub) ? "has" : "have";
                q = `Since last year, ${sub} (${v.base}) ___ ${ctx}.`;
                a = `${hv} ${v.ed}`;
                dist = [`${hv} ${v.ing}`, `had ${v.ed}`, `${hv === 'has' ? 'have' : 'has'} ${v.ed}`];
            } else if (tenseId === 'past_sim') {
                type = 2;
                q = `Sắp xếp: ${sub} / ${v.ed} / ${ctx} / last month`;
                a = `${sub} ${v.ed} ${ctx} last month`;
                words = [sub, v.ed, ctx, "last month"];
            } else if (tenseId === 'past_cont') {
                let be = isSingular(sub) ? "was" : "were";
                q = `While ${sub} (${v.base}) ___ ${ctx}, the phone rang.`;
                a = `${be} ${v.ing}`;
                dist = [`${be} ${v.ed}`, `is ${v.ing}`, `am ${v.ing}`];
            }
            return { q, a, dist, words, src, type };
        }

        function renderMap() {
            const list = document.getElementById('stage-list');
            list.innerHTML = '';
            STAGES.forEach(s => {
                list.innerHTML += `
                    <div class="neu-card" style="background:${s.color}">
                        <h3 style="margin:0 0 10px 0">${s.name}</h3>
                        <button class="btn-neu" onclick="startQuiz('${s.id}')">LUYỆN ĐỀ</button>
                    </div>`;
            });
            document.getElementById('global-xp').innerText = xp;
        }

        function startQuiz(id) {
            curTense = id;
            document.getElementById('map-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            nextQuestion();
        }

        function nextQuestion() {
            isChecking = false;
            const q = generateExamQuestion(curTense);
            const box = document.getElementById('question-box');
            box.style.borderColor = "transparent";
            document.getElementById('quiz-title').innerText = curTense.toUpperCase();
            document.getElementById('exam-source').innerText = q.src;
            document.getElementById('q-text').innerText = q.q;
            
            const zone = document.getElementById('ans-zone');
            zone.innerHTML = '';

            if (q.type === 1) {
                const opts = [...q.dist, q.a].sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn-neu'; b.style.marginBottom = '10px';
                    b.innerText = opt;
                    b.onclick = () => checkAns(opt, q.a);
                    zone.appendChild(b);
                });
            } else {
                let userArr = [];
                const display = document.createElement('div');
                display.className = 'neu-card'; display.style.minHeight = '60px';
                zone.appendChild(display);
                q.words.sort(() => Math.random() - 0.5).forEach(w => {
                    const c = document.createElement('span');
                    c.className = 'word-chip'; c.innerText = w;
                    c.onclick = () => {
                        if(isChecking) return;
                        userArr.push(w);
                        display.innerText = userArr.join(" ");
                        c.style.visibility = 'hidden';
                        if(userArr.length === q.words.length) checkAns(userArr.join(" "), q.a);
                    };
                    zone.appendChild(c);
                });
            }
        }

        function checkAns(input, target) {
            if(isChecking) return;
            isChecking = true;
            const box = document.getElementById('question-box');
            
            if (input.trim().toLowerCase() === target.trim().toLowerCase()) {
                confetti({ particleCount: 80, spread: 70 });
                box.style.borderColor = "var(--s)";
                xp += 50;
                document.getElementById('global-xp').innerText = xp;
                setTimeout(nextQuestion, 1000);
            } else {
                box.classList.add('shake');
                box.style.borderColor = "var(--d)";
                setTimeout(() => {
                    box.classList.remove('shake');
                    if(curTense === 'past_sim') nextQuestion(); // Reset chips
                    else isChecking = false;
                }, 500);
            }
        }

        function exitQuiz() {
            document.getElementById('map-view').style.display = 'block';
            document.getElementById('quiz-view').style.display = 'none';
            renderMap();
        }

        function nextSmartFlashcard() {
            const v = EXAM_DATA.verbs[Math.floor(Math.random() * EXAM_DATA.verbs.length)];
            document.getElementById('fc-word').innerText = v.base.toUpperCase();
            document.getElementById('fc-mean').innerText = v.m;
        }

        renderMap();
        nextSmartFlashcard();
    </script>
</body>
</html>
