<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAMMARARENA FX - Web Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #9333ea; --s: #bef264; --w: #fbbf24; --d: #ff6b6b; --blue: #7dd3fc; }
        * { box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background-color: #fdfaf6; margin: 0; padding: 15px; color: #000; }
        
        .neu-card {
            border: 4px solid #000; border-radius: 15px; padding: 20px;
            box-shadow: 6px 6px 0px 0px #000; background: white; margin-bottom: 20px;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-neu {
            width: 100%; border: 4px solid #000; box-shadow: 4px 4px 0px 0px #000;
            background-color: #fff; color: #000; font-weight: 900; border-radius: 12px;
            padding: 12px; font-size: 1rem; text-transform: uppercase; cursor: pointer; transition: 0.1s;
        }
        .btn-neu:hover { background-color: #f0f0f0; transform: translate(-2px, -2px); }
        .btn-neu:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px #000; }
        
        .prog-container { background: #eee; border: 2px solid #000; height: 14px; border-radius: 7px; overflow: hidden; margin: 8px 0; }
        .prog-bar { background: #000; height: 100%; width: 0%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .tag { padding: 3px 10px; border: 2.5px solid #000; border-radius: 6px; font-size: 0.75rem; font-weight: 900; }

        #quiz-view { display: none; }
        
        .word-chip {
            display: inline-block; padding: 8px 14px; border: 3px solid #000;
            background: #fff; margin: 5px; cursor: pointer; font-weight: 800; border-radius: 10px;
            box-shadow: 3px 3px 0px #000;
        }
        .word-chip:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }

        input.neu-input {
            width: 100%; border: 4px solid #000; padding: 15px; font-size: 1.3rem;
            border-radius: 12px; outline: none; margin-bottom: 15px; text-align: center;
            box-shadow: 4px 4px 0px #000;
        }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .shake { animation: shake 0.3s; background: #fee2e2 !important; border-color: var(--d) !important; }
    </style>
</head>
<body>

    <div class="neu-card flex-between" style="position: sticky; top: 0; z-index: 100; background: #fff; padding: 10px 20px;">
        <div style="font-weight:900; font-size:1.5rem;">🦉 ARENA <span id="rank-tag" class="tag" style="background:var(--w)">ROOKIE</span></div>
        <div style="display:flex; gap:10px;">
            <div class="tag" style="background:var(--s);">🔥 <span id="xp-display">0</span> XP</div>
        </div>
    </div>

    <div id="map-view">
        <div class="neu-card" style="background: var(--p); color: white;">
            <h1 style="margin:0;">TENSE QUEST MAP 🗺️</h1>
            <p style="font-weight:600;">Chinh phục 12 thì - Thuộc lòng 3000 từ!</p>
        </div>

        <h3>BATTLE STAGES</h3>
        <div class="grid-2" id="tense-grid"></div>

        <div class="grid-2">
            <div class="neu-card">
                <h3>🎴 SMART FLASHCARD</h3>
                <div id="fc-box" style="text-align:center; padding: 15px; border: 3px dashed #000; border-radius: 10px; margin-bottom: 15px;">
                    <div id="fc-word" style="font-size:2rem; font-weight:900; color:var(--p);">Algorithm</div>
                    <div id="fc-phonetic" style="font-style:italic; font-weight:700; color:#555;">/ˈæl.ɡə.rɪ.ðəm/</div>
                    <div id="fc-mean" style="font-size:1.1rem; font-weight:700; margin-top:10px;">Thuật toán</div>
                </div>
                <button class="btn-neu" onclick="nextFlashcard()">ĐÃ THUỘC! TIẾP 🔄</button>
            </div>

            <div class="neu-card" style="background: var(--w);">
                <h3>🏆 LEADERBOARD</h3>
                <div style="font-weight:900; border-bottom: 2px solid #000; padding: 5px 0;">#1 YOU (<span class="user-xp">0</span> XP)</div>
                <div style="font-weight:700; opacity: 0.7; padding: 5px 0;">#2 Bot_Pro (1,500 XP)</div>
                <div style="font-weight:700; opacity: 0.7; padding: 5px 0;">#3 Oxford_AI (1,250 XP)</div>
                <button class="btn-neu" style="background:#ff4b4b; color:#fff; margin-top:10px; font-size:0.8rem;" onclick="resetData()">RESET ALL ⚠️</button>
            </div>
        </div>
    </div>

    <div id="quiz-view">
        <div class="neu-card">
            <div class="flex-between">
                <span id="quiz-title-tag" class="tag" style="background:white;">PRESENT SIMPLE</span>
                <span id="combo-tag" style="font-weight:900; color:var(--d);"></span>
            </div>
            <div id="q-container" style="text-align:center; padding: 50px 10px; min-height: 300px;">
                <h2 id="q-text" style="font-size: 1.8rem; line-height: 1.4;">Loading...</h2>
                <div id="ans-zone" style="margin-top: 30px;"></div>
            </div>
            <button class="btn-neu" style="background:#e5e7eb;" onclick="exitQuiz()">⬅️ RÚT LUI VỀ BẢN ĐỒ</button>
        </div>
    </div>

    <script>
        const STAGES = [
            { id: 'pres_sim', name: 'Present Simple', color: '#bef264', lvl: 1 },
            { id: 'pres_cont', name: 'Present Cont.', color: '#7dd3fc', lvl: 1 },
            { id: 'past_sim', name: 'Past Simple', color: '#fbbf24', lvl: 2 },
            { id: 'past_cont', name: 'Past Cont.', color: '#ff90e8', lvl: 2 },
            { id: 'pres_perf', name: 'Pres. Perfect', color: '#ff6b6b', lvl: 3 },
            { id: 'fut_sim', name: 'Future Simple', color: '#9333ea', lvl: 1 }
        ];

        const QUIZ_DB = {
            'pres_sim': [
                {q: "She (not/drink) ___ tea.", a: "doesn't drink", type: 1, dist: ["don't drink", "not drink"]},
                {q: "The sun (rise) ___ in the East.", a: "rises", type: 1, dist: ["rising", "rise"]}
            ],
            'pres_cont': [
                {q: "Look! They (run) ___ towards us.", a: "are running", type: 1, dist: ["run", "is running"]},
                {q: "I / currently / reading / am / a book", a: "I am currently reading a book", type: 2, words: ["am", "reading", "I", "currently", "a book"]}
            ],
            'past_sim': [
                {q: "We / visited / Paris / last / summer", a: "We visited Paris last summer", type: 2, words: ["visited", "Paris", "We", "summer", "last"]},
                {q: "He / bought / a / new / car / yesterday", a: "He bought a new car yesterday", type: 2, words: ["a", "bought", "yesterday", "car", "new", "He"]}
            ],
            'past_cont': [
                {q: "What (you/do) ___ at 8 PM yesterday?", a: "were you doing", type: 1, dist: ["was you doing", "did you do"]},
                {q: "She (sleep) ___ when I called.", a: "was sleeping", type: 3}
            ],
            'pres_perf': [
                {q: "I (be) ___ to Japan twice.", a: "have been", type: 3},
                {q: "She (just/finish) ___ her lunch.", a: "has just finished", type: 3}
            ],
            'fut_sim': [
                {q: "I think it (rain) ___ tomorrow.", a: "will rain", type: 1, dist: ["rains", "is raining"]},
                {q: "They / won't / the / attend / meeting", a: "They won't attend the meeting", type: 2, words: ["won't", "attend", "meeting", "the", "They"]}
            ]
        };

        const VOCAB_LIST = [
            {w: "Algorithm", p: "/ˈæl.ɡə.rɪ.ðəm/ (n)", m: "Thuật toán"},
            {w: "Substantial", p: "/səbˈstæn.ʃəl/ (adj)", m: "Đáng kể"},
            {w: "Persuade", p: "/pəˈsweɪd/ (v)", m: "Thuyết phục"},
            {w: "Hierarchy", p: "/ˈhaɪə.rɑː.ki/ (n)", m: "Hệ tư tưởng/Cấp bậc"},
            {w: "Ambiguous", p: "/æmˈbɪɡ.ju.əs/ (adj)", m: "Mơ hồ"}
        ];

        let xp = 0;
        let progress = {};
        let vocabQueue = [...VOCAB_LIST].sort(() => Math.random() - 0.5);
        let curQData = [];
        let curQIdx = 0;
        let curStage = null;
        let isChecking = false;

        function renderMap() {
            const grid = document.getElementById('tense-grid');
            grid.innerHTML = '';
            STAGES.forEach(s => {
                const p = progress[s.id] || 0;
                grid.innerHTML += `
                    <div class="neu-card" style="background:${s.color}">
                        <div class="flex-between"><span class="tag" style="background:#fff">LVL.${s.lvl}</span> <b>${p}%</b></div>
                        <h3 style="margin:10px 0">${s.name}</h3>
                        <div class="prog-container"><div class="prog-bar" style="width:${p}%"></div></div>
                        <button class="btn-neu" style="padding:8px; font-size:0.8rem;" onclick="startQuiz('${s.id}')">BẮT ĐẦU</button>
                    </div>
                `;
            });
            document.getElementById('xp-display').innerText = xp;
            document.querySelectorAll('.user-xp').forEach(el => el.innerText = xp);
        }

        function nextFlashcard() {
            if (vocabQueue.length === 0) vocabQueue = [...VOCAB_LIST].sort(() => Math.random() - 0.5);
            const item = vocabQueue.shift();
            document.getElementById('fc-word').innerText = item.w;
            document.getElementById('fc-phonetic').innerText = item.p;
            document.getElementById('fc-mean').innerText = item.m;
        }

        function startQuiz(id) {
            curStage = STAGES.find(s => s.id === id);
            curQData = (QUIZ_DB[id] || QUIZ_DB['pres_sim']).sort(() => Math.random() - 0.5);
            curQIdx = 0;
            document.getElementById('map-view').style.display = 'none';
            document.getElementById('quiz-view').style.display = 'block';
            document.getElementById('quiz-title-tag').innerText = curStage.name.toUpperCase();
            loadQuestion();
        }

        function loadQuestion() {
            const q = curQData[curQIdx];
            const zone = document.getElementById('ans-zone');
            document.getElementById('q-text').innerText = q.q;
            zone.innerHTML = '';
            isChecking = false;

            if (q.type === 1) {
                const opts = [...q.dist, q.a].sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'btn-neu';
                    b.style.marginBottom = '10px';
                    b.innerText = opt;
                    b.onclick = () => checkAns(opt, q.a);
                    zone.appendChild(b);
                });
            } else if (q.type === 2) {
                let userArr = [];
                const display = document.createElement('div');
                display.className = 'neu-card';
                display.style.minHeight = '60px';
                display.style.fontSize = '1.3rem';
                display.style.fontWeight = '800';
                zone.appendChild(display);

                q.words.sort(() => Math.random() - 0.5).forEach(w => {
                    const chip = document.createElement('span');
                    chip.className = 'word-chip';
                    chip.innerText = w;
                    chip.onclick = () => {
                        if (isChecking) return;
                        userArr.push(w);
                        display.innerText = userArr.join(" ");
                        chip.style.visibility = 'hidden';
                        if(userArr.length === q.words.length) checkAns(userArr.join(" "), q.a);
                    };
                    zone.appendChild(chip);
                });
            } else if (q.type === 3) {
                const input = document.createElement('input');
                input.className = 'neu-input';
                input.placeholder = "Nhập đáp án...";
                input.onkeypress = (e) => { if(e.key === 'Enter') checkAns(input.value.trim(), q.a); };
                zone.appendChild(input);
                const btn = document.createElement('button');
                btn.className = 'btn-neu';
                btn.innerText = "KIỂM TRA";
                btn.onclick = () => checkAns(input.value.trim(), q.a);
                zone.appendChild(btn);
            }
        }

        function checkAns(input, target) {
            if (isChecking) return;
            isChecking = true;
            const box = document.getElementById('q-container');
            if (input.toLowerCase() === target.toLowerCase()) {
                confetti({ particleCount: 100, spread: 70 });
                xp += (curStage.lvl * 20);
                progress[curStage.id] = Math.min(100, (progress[curStage.id] || 0) + 20);
                document.getElementById('xp-display').innerText = xp;
                curQIdx++;
                if(curQIdx < curQData.length) setTimeout(loadQuestion, 800);
                else { setTimeout(() => { alert("STAGE CLEAR! 🎉"); exitQuiz(); }, 800); }
            } else {
                box.classList.add('shake');
                setTimeout(() => {
                    box.classList.remove('shake');
                    if (curQData[curQIdx].type === 2) loadQuestion();
                    else isChecking = false;
                }, 400);
            }
        }

        function exitQuiz() {
            document.getElementById('map-view').style.display = 'block';
            document.getElementById('quiz-view').style.display = 'none';
            renderMap();
        }

        function resetData() {
            if(confirm("Xóa toàn bộ tiến độ?")) { xp = 0; progress = {}; renderMap(); }
        }

        renderMap();
        nextFlashcard();
    </script>
</body>
</html>
